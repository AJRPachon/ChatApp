build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  CyclomaticComplexMethod:
    active: true
    threshold: 20
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    active: true
    thresholdInClasses: 20
    thresholdInObjects: 20
    thresholdInFiles: 30

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'IllegalMonitorStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'StackOverflowError'
      - 'ClassCastException'
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable', 'Test']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[a-z][A-Za-z0-9]*'
    privatePropertyPattern: '_?[a-z][A-Za-z0-9]*'

performance:
  active: true
  ArrayPrimitive:
    active: true
  SpreadOperator:
    active: false
  UnnecessaryPartOfBinaryExpression:
    active: true

potential-bugs:
  active: true
  DontDowncastCollectionTypes:
    active: true
  ExplicitGarbageCollectionCall:
    active: true
  MissingPackageDeclaration:
    active: true
  NullCheckOnMutableProperty:
    active: true
  UnreachableCatchBlock:
    active: true

style:
  active: true
  ForbiddenComment:
    active: false
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 4
    excludedFunctions: ['equals']
  UnusedImports:
    active: true
  WildcardImport:
    active: true
    excludeImports:
      - 'kotlinx.coroutines.*'
      - 'androidx.compose.material3.*'
      - 'androidx.compose.ui.*'
      - 'androidx.compose.foundation.*'
      - 'androidx.compose.runtime.*'
